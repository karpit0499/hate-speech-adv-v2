name: build-and-push
on:
  push: { branches: [main] }
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Unit tests (no model needed)
        run: |
          pip install --quiet pytest httpx fastapi pydantic
          pytest serving -m "not integration" -q
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/hs-classifier" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./serving
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE }}:latest
